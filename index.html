<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>Ireland Family Trip — April 2026</title>
<style>
:root {
  --green: #1a7a4c;
  --green-light: #e8f5ee;
  --green-dark: #0d5c36;
  --amber: #e6960a;
  --amber-light: #fff3e0;
  --red: #d32f2f;
  --red-light: #ffeaea;
  --blue: #1976d2;
  --gray-50: #f8f9fa;
  --gray-100: #f1f3f5;
  --gray-200: #e9ecef;
  --gray-400: #adb5bd;
  --gray-600: #6c757d;
  --gray-800: #343a40;
  --radius: 12px;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-lg: 0 4px 20px rgba(0,0,0,0.12);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--gray-100);
  color: var(--gray-800);
  line-height: 1.6;
}
header {
  background: linear-gradient(135deg, var(--green-dark), var(--green));
  color: white;
  padding: 2rem 1.5rem 1rem;
  text-align: center;
  position: relative;
}
header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.25rem; }
header p { opacity: 0.9; font-size: 1rem; }
.lang-toggle {
  position: absolute;
  top: 1rem;
  right: 1.5rem;
  display: flex;
  gap: 0;
  background: rgba(255,255,255,0.15);
  border-radius: 6px;
  overflow: hidden;
}
.lang-toggle button {
  padding: 6px 14px;
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 500;
  transition: all 0.2s;
}
.lang-toggle button.active {
  background: rgba(255,255,255,0.25);
  color: white;
}
.day-nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: white;
  display: flex;
  overflow-x: auto;
  border-bottom: 1px solid var(--gray-200);
  box-shadow: var(--shadow);
  scrollbar-width: none;
}
.day-nav::-webkit-scrollbar { display: none; }
.day-nav button {
  flex-shrink: 0;
  padding: 12px 20px;
  border: none;
  background: white;
  cursor: pointer;
  font-size: 0.85rem;
  color: var(--gray-600);
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}
.day-nav button:hover { color: var(--green); background: var(--green-light); }
.day-nav button.active { color: var(--green); border-bottom-color: var(--green); font-weight: 600; }
main { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }
.day-section { display: none; }
.day-section.active { display: block; }

.day-header {
  background: white;
  border-radius: var(--radius);
  padding: 1.5rem;
  box-shadow: var(--shadow);
  margin-bottom: 1rem;
}
.day-header h2 { font-size: 1.3rem; color: var(--green-dark); margin-bottom: 0.25rem; }
.day-header .subtitle { color: var(--gray-600); font-size: 0.9rem; }
.traveler-badge {
  display: inline-block;
  background: var(--green-light);
  color: var(--green);
  padding: 3px 12px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  margin-top: 0.5rem;
}
.rain-warning {
  margin-top: 0.75rem;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 500;
  display: none;
}
.rain-warning.amber { background: var(--amber-light); color: var(--amber); display: flex; align-items: center; gap: 6px; }
.rain-warning.red { background: var(--red-light); color: var(--red); display: flex; align-items: center; gap: 6px; }

.card {
  background: white;
  border-radius: var(--radius);
  padding: 1.25rem;
  box-shadow: var(--shadow);
  margin-bottom: 1rem;
}
.card h3 { font-size: 1rem; margin-bottom: 0.75rem; color: var(--gray-800); }

/* Timeline */
.timeline { }
.segment {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding-bottom: 0.75rem;
  margin-bottom: 0.6rem;
  border-bottom: 1px solid var(--gray-100);
}
.segment:last-child { padding-bottom: 0; margin-bottom: 0; border-bottom: none; }
.segment .time-col {
  flex-shrink: 0;
  width: 46px;
  text-align: right;
  line-height: 1.35;
  padding-top: 3px;
}
.segment .time-col .time-start { font-size: 0.82rem; font-weight: 700; color: var(--gray-800); }
.segment .time-col .time-end { font-size: 0.75rem; font-weight: 400; color: var(--gray-400); }
.segment .dot {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
}
.segment.flight .dot { background: #e3f2fd; }
.segment.drive .dot { background: var(--green-light); }
.segment.train .dot { background: #fff3e0; }
.segment.activity .dot { background: var(--gray-100); }
.segment .info { flex: 1; min-width: 0; }
.segment .info h4 { font-size: 0.9rem; font-weight: 600; margin-bottom: 2px; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
.segment .info p { font-size: 0.82rem; color: var(--gray-600); }
.segment .duration {
  display: inline-block;
  background: var(--gray-100);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--gray-600);
  margin-top: 2px;
}
.segment .info .split-label {
  display: inline-block;
  background: #fff3e0;
  color: var(--amber);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.72rem;
  font-weight: 600;
  margin-bottom: 4px;
}
.weather-inline {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 0.72rem;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 10px;
  white-space: nowrap;
}
.weather-inline.wi-clear { background: #e8f5e9; color: #388e3c; }
.weather-inline.wi-rainy { background: var(--amber-light); color: #e65100; }
.weather-inline.wi-heavy { background: var(--red-light); color: var(--red); }

/* Hotel card */
.hotel-card { border-left: 4px solid var(--green); }
.hotel-card .hotel-name { font-weight: 700; color: var(--green-dark); }
.hotel-card .hotel-detail { font-size: 0.82rem; color: var(--gray-600); margin-top: 4px; }

/* Activities */
.activities ul { list-style: none; }
.activities li {
  padding: 6px 0;
  padding-left: 1.5rem;
  position: relative;
  font-size: 0.9rem;
}
.activities li::before {
  content: '>';
  position: absolute;
  left: 0;
  color: var(--green);
  font-weight: 700;
}

/* Documents */
.doc-list { display: flex; flex-wrap: wrap; gap: 8px; }
.doc-tag {
  background: var(--gray-100);
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 0.78rem;
  color: var(--gray-600);
}

/* Weather */
.weather-loading { text-align: center; color: var(--gray-400); padding: 2rem; font-size: 0.9rem; }
.weather-grid {
  display: flex;
  overflow-x: auto;
  gap: 0;
  padding-bottom: 4px;
  scrollbar-width: thin;
}
.weather-hour {
  flex-shrink: 0;
  width: 52px;
  text-align: center;
  padding: 6px 2px;
  border-right: 1px solid var(--gray-100);
  position: relative;
}
.weather-hour:last-child { border-right: none; }
.weather-hour .wh-time { font-size: 0.7rem; color: var(--gray-600); font-weight: 600; }
.weather-hour .wh-icon { font-size: 1.1rem; margin: 4px 0; }
.weather-hour .wh-temp { font-size: 0.75rem; font-weight: 600; }
.weather-hour .wh-rain-bar {
  height: 30px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  margin-top: 4px;
}
.weather-hour .wh-rain-bar .bar {
  width: 16px;
  border-radius: 3px 3px 0 0;
  min-height: 2px;
  transition: height 0.3s;
}
.weather-hour .wh-rain-pct { font-size: 0.65rem; color: var(--gray-400); margin-top: 2px; }
.weather-hour.rain-amber { background: rgba(230,150,10,0.06); }
.weather-hour.rain-red { background: rgba(211,47,47,0.08); }
.weather-summary-row {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  margin-bottom: 0.75rem;
  font-size: 0.85rem;
}
.weather-summary-row .ws-item {
  display: flex;
  align-items: center;
  gap: 4px;
  color: var(--gray-600);
}
.weather-summary-row .ws-item strong { color: var(--gray-800); }

/* Group split */
.group-block {
  border: 1px solid var(--gray-200);
  border-radius: 8px;
  padding: 1rem;
  margin-bottom: 0.75rem;
}
.group-block h4 {
  font-size: 0.85rem;
  margin-bottom: 0.5rem;
  color: var(--green-dark);
}

@media (max-width: 600px) {
  header h1 { font-size: 1.4rem; }
  .day-nav button { padding: 10px 14px; font-size: 0.8rem; }
  main { padding: 1rem 0.5rem; }
  .card { padding: 1rem; }
  .weather-hour { width: 46px; }
  .lang-toggle { top: 0.5rem; right: 0.5rem; }
  .lang-toggle button { padding: 4px 10px; font-size: 0.75rem; }
}
</style>
</head>

// ── Weather data store ──
let weatherData = {};

async function fetchWeather() {
  const locs = Object.entries(weatherLocations);
  const promises = locs.map(([key, { lat, lon }]) =>
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,precipitation_probability,precipitation,weather_code,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max&timezone=Europe%2FLondon&start_date=2026-04-06&end_date=2026-04-13`)
      .then(r => r.json())
      .then(data => { weatherData[key] = data; })
      .catch(() => { weatherData[key] = null; })
  );
  await Promise.all(promises);
  render();
}

function getHourlyForDay(locationKey, dateStr) {
  const data = weatherData[locationKey];
  if (!data || !data.hourly) return null;
  const hours = [];
  for (let h = 7; h <= 22; h++) {
    const timeStr = `${dateStr}T${String(h).padStart(2,'0')}:00`;
    const idx = data.hourly.time.indexOf(timeStr);
    if (idx === -1) continue;
    hours.push({
      hour: h,
      temp: data.hourly.temperature_2m[idx],
      rainProb: data.hourly.precipitation_probability[idx],
      precip: data.hourly.precipitation[idx],
      code: data.hourly.weather_code[idx],
      wind: data.hourly.wind_speed_10m[idx],
    });
  }
  return hours.length > 0 ? hours : null;
}

function getDailyForDay(locationKey, dateStr) {
  const data = weatherData[locationKey];
  if (!data || !data.daily) return null;
  const idx = data.daily.time.indexOf(dateStr);
  if (idx === -1) return null;
  return {
    maxTemp: data.daily.temperature_2m_max[idx],
    minTemp: data.daily.temperature_2m_min[idx],
    precipSum: data.daily.precipitation_sum[idx],
    maxRainProb: data.daily.precipitation_probability_max[idx],
  };
}

// ── Rendering ──
let activeDay = 0;

function render() {
  renderNav();
  renderDays();
}

function renderNav() {
  const nav = document.getElementById('dayNav');
  const weekdays = ['mon','tue','wed','thu','fri','sat','sun'];
  nav.innerHTML = days.map((d, i) => {
    const dateNum = d.date.slice(-2);
    const wd = t(d.weekday);
    return `<button class="${i === activeDay ? 'active' : ''}" onclick="switchDay(${i})">${wd} ${dateNum}</button>`;
  }).join('');
}

function switchDay(i) {
  activeDay = i;
  render();
  document.getElementById('dayNav').children[i].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

function renderDays() {
  const main = document.getElementById('main');
  main.innerHTML = days.map((d, i) => `
    <div class="day-section ${i === activeDay ? 'active' : ''}" id="day-${i}">
      ${renderDayHeader(d)}
      ${d.isSplitDay ? renderSplitItinerary(d) : renderItinerary(d)}
      ${renderActivities(d)}
      ${d.hotel ? renderHotel(d.hotel) : ''}
      ${renderWeather(d)}
      ${renderDocs(d)}
    </div>
  `).join('');
}

function renderDayHeader(d) {
  const daily = getDailyForDay(d.weatherKey, d.date);
  let rainClass = '';
  let rainMsg = '';
  if (daily) {
    if (daily.maxRainProb >= 60) { rainClass = 'red'; rainMsg = t('rain_likely'); }
    else if (daily.maxRainProb >= 35) { rainClass = 'amber'; rainMsg = t('rain_possible'); }
  }
  const dateObj = new Date(d.date + 'T12:00:00');
  const dateFormatted = dateObj.toLocaleDateString(currentLang === 'zh' ? 'zh-CN' : 'en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  return `
    <div class="day-header">
      <h2>${d.title[currentLang] || d.title.en}</h2>
      <div class="subtitle">${dateFormatted} · ${d.location[currentLang] || d.location.en}</div>
      <span class="traveler-badge">${t(d.travelers)}</span>
      ${rainMsg ? `<div class="rain-warning ${rainClass}">🌧️ ${rainMsg}</div>` : ''}
    </div>`;
}

function parseTimeRange(timeStr) {
  if (!timeStr) return { start: '', end: '' };
  const rangeMatch = timeStr.match(/~?(\d{1,2}:\d{2})\s*[–-]\s*~?(\d{1,2}:\d{2})/);
  if (rangeMatch) return { start: rangeMatch[1], end: rangeMatch[2] };
  const singleMatch = timeStr.match(/~?(\d{1,2}:\d{2})/);
  if (singleMatch) return { start: singleMatch[1], end: '' };
  return { start: '', end: '' };
}

function parseStartHour(timeStr) {
  if (!timeStr) return null;
  const match = timeStr.match(/~?(\d{1,2}):\d{2}/);
  return match ? parseInt(match[1]) : null;
}

function getWeatherForHour(hourlyData, hour) {
  if (!hourlyData || hour === null) return null;
  return hourlyData.find(h => h.hour === hour) || null;
}

function renderWeatherInline(w) {
  if (!w) return '';
  const icon = weatherCodeIcons[w.code] || '';
  const parts = [`${icon}${Math.round(w.temp)}°`];
  if (w.rainProb >= 25) parts.push(`💧${w.rainProb}%`);
  if (w.wind >= 20) parts.push(`💨${Math.round(w.wind)}`);
  let cls = 'wi-clear';
  if (w.rainProb >= 60) cls = 'wi-heavy';
  else if (w.rainProb >= 35) cls = 'wi-rainy';
  return `<span class="weather-inline ${cls}">${parts.join(' ')}</span>`;
}

function renderSegment(seg, hourlyData) {
  const { start, end } = parseTimeRange(seg.time);
  const startHour = parseStartHour(seg.time);
  const w = getWeatherForHour(hourlyData, startHour);
  const titleText = seg.title[currentLang] || seg.title.en;
  const titleHtml = seg.mapUrl
    ? `<a href="${seg.mapUrl}" target="_blank" rel="noopener" style="color:inherit;text-decoration-line:underline;text-decoration-style:dotted;text-underline-offset:3px">${titleText}</a>`
    : titleText;
  const weatherHtml = seg.type === 'activity' ? renderWeatherInline(w) : '';
  return `
    <div class="segment ${seg.type}">
      <div class="time-col">
        ${start ? `<div class="time-start">${start}</div>` : ''}
        ${end ? `<div class="time-end">${end}</div>` : ''}
      </div>
      <div class="dot">${seg.icon}</div>
      <div class="info">
        <h4>${titleHtml} ${weatherHtml}</h4>
        <p>${seg.duration || ''}</p>
      </div>
    </div>`;
}

function renderItinerary(d) {
  if (!d.segments || d.segments.length === 0) return '';
  const hourly = getHourlyForDay(d.weatherKey, d.date);
  return `
    <div class="card">
      <h3>${t('itinerary')}</h3>
      <div class="timeline">${d.segments.map(seg => renderSegment(seg, hourly)).join('')}</div>
    </div>`;
}

function renderSplitItinerary(d) {
  const gA = d.segmentsGroupA;
  const gB = d.segmentsGroupB;
  const hourly = getHourlyForDay(d.weatherKey, d.date);
  const morningHtml = d.segments && d.segments.length > 0
    ? `<div class="timeline" style="margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:2px solid var(--gray-200)">${d.segments.map(seg => renderSegment(seg, hourly)).join('')}</div>`
    : '';
  return `
    <div class="card">
      <h3>${t('itinerary')}</h3>
      ${morningHtml}
      <div class="group-block">
        <h4>${t(gA.label)}</h4>
        <div class="timeline">${gA.segments.map(seg => renderSegment(seg, hourly)).join('')}</div>
      </div>
      <div class="group-block">
        <h4>${t(gB.label)}</h4>
        <div class="timeline">${gB.segments.map(seg => renderSegment(seg, hourly)).join('')}</div>
      </div>
    </div>`;
}

function renderActivities(d) {
  const items = d.activities[currentLang] || d.activities.en;
  if (!items || items.length === 0) return '';
  return `
    <div class="card activities">
      <h3>${t('activities')}</h3>
      <ul>${items.map(a => `<li>${a}</li>`).join('')}</ul>
    </div>`;
}

function renderHotel(h) {
  const note = h.note ? (h.note[currentLang] || h.note.en) : '';
  const nameHtml = h.mapUrl
    ? `<a href="${h.mapUrl}" target="_blank" rel="noopener" style="color:inherit;text-decoration-line:underline;text-decoration-style:dotted;text-underline-offset:3px">${h.name}</a>`
    : h.name;
  return `
    <div class="card hotel-card">
      <h3>🏨 ${t('hotel')}</h3>
      <div class="hotel-name">${nameHtml}</div>
      <div class="hotel-detail">${h.addr}</div>
      <div class="hotel-detail">${h.rooms} ${t('rooms')} · ${t('checkin')}: ${h.checkin} · ${t('checkout')}: ${h.checkout}</div>
      ${note ? `<div class="hotel-detail" style="margin-top:4px;color:var(--amber);font-weight:500">${note}</div>` : ''}
    </div>`;
}

function renderWeather(d) {
  const hourly = getHourlyForDay(d.weatherKey, d.date);
  const daily = getDailyForDay(d.weatherKey, d.date);
  if (!weatherData[d.weatherKey]) {
    return `<div class="card"><h3>${t('weather')} — ${d.location[currentLang] || d.location.en}</h3><div class="weather-loading">${t('loading_weather')}</div></div>`;
  }
  if (!hourly) {
    return `<div class="card"><h3>${t('weather')}</h3><div class="weather-loading">${t('weather_unavailable')}</div></div>`;
  }
  const summaryHtml = daily ? `
    <div class="weather-summary-row">
      <div class="ws-item">🌡️ <strong>${daily.minTemp}° – ${daily.maxTemp}°C</strong></div>
      <div class="ws-item">💧 ${currentLang === 'zh' ? '总降水' : 'Total rain'}: <strong>${daily.precipSum} mm</strong></div>
      <div class="ws-item">☔ ${currentLang === 'zh' ? '最高概率' : 'Max chance'}: <strong>${daily.maxRainProb}%</strong></div>
    </div>` : '';

  const hoursHtml = hourly.map(h => {
    const icon = weatherCodeIcons[h.code] || '❓';
    const rainH = h.rainProb >= 60 ? 'rain-red' : h.rainProb >= 35 ? 'rain-amber' : '';
    const barColor = h.rainProb >= 60 ? 'var(--red)' : h.rainProb >= 35 ? 'var(--amber)' : '#90caf9';
    const barHeight = Math.max(2, (h.rainProb / 100) * 28);
    const ampm = h.hour < 12 ? 'am' : 'pm';
    const displayH = h.hour <= 12 ? h.hour : h.hour - 12;
    return `
      <div class="weather-hour ${rainH}">
        <div class="wh-time">${displayH}${ampm}</div>
        <div class="wh-icon">${icon}</div>
        <div class="wh-temp">${Math.round(h.temp)}°</div>
        <div class="wh-rain-bar"><div class="bar" style="height:${barHeight}px;background:${barColor}"></div></div>
        <div class="wh-rain-pct">${h.rainProb}%</div>
      </div>`;
  }).join('');

  return `
    <div class="card">
      <h3>${t('weather')} — ${d.location[currentLang] || d.location.en}</h3>
      ${summaryHtml}
      <div class="weather-grid">${hoursHtml}</div>
    </div>`;
}

function renderDocs(d) {
  if (!d.pdfs || d.pdfs.length === 0) return '';
  return `
    <div class="card">
      <h3>📄 ${t('documents')}</h3>
      <div class="doc-list">${d.pdfs.map(p => `<span class="doc-tag">${p}</span>`).join('')}</div>
    </div>`;
}

// ── Init ──
render();
fetchWeather();
</script>
</body>
</html>
